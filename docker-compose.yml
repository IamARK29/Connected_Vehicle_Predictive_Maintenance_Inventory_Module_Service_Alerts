version: "3.9"

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER:     autopredict
      POSTGRES_PASSWORD: autopredict
      POSTGRES_DB:       autopredict_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autopredict -d autopredict_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  influxdb:
    image: influxdb:2.7
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE:        setup
      DOCKER_INFLUXDB_INIT_USERNAME:    admin
      DOCKER_INFLUXDB_INIT_PASSWORD:    autopredict123
      DOCKER_INFLUXDB_INIT_ORG:         autopredict
      DOCKER_INFLUXDB_INIT_BUCKET:      telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: autopredict-dev-token
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
      KAFKA_CREATE_TOPICS: >-
        telemetry.hf:12:1:retention.ms=86400000,
        telemetry.standard:12:1:retention.ms=604800000,
        telemetry.lf:4:1:retention.ms=604800000,
        telemetry.rejected:4:1:retention.ms=2592000000,
        dtc.events:4:1:retention.ms=7776000000,
        features.daily:4:1:retention.ms=7776000000,
        predictions.generated:8:1:retention.ms=2592000000,
        alerts.generated:8:1:retention.ms=7776000000,
        alerts.dispatched:4:1:retention.ms=31536000000,
        service.workflow:4:1:retention.ms=31536000000,
        dealer.inventory:4:1:retention.ms=2592000000,
        vehicle.twin.updates:12:1:retention.ms=86400000
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    restart: unless-stopped
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Application services ────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_URL:        postgresql://autopredict:autopredict@postgres:5432/autopredict_db
      DATABASE_URL:        postgresql://autopredict:autopredict@postgres:5432/autopredict_db
      INFLUXDB_URL:        http://influxdb:8086
      INFLUXDB_TOKEN:      autopredict-dev-token
      INFLUXDB_ORG:        autopredict
      INFLUXDB_BUCKET:     telemetry
      REDIS_URL:           redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
      KAFKA_BOOTSTRAP:     kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./models/saved:/app/models/saved
      - api_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_URL:    postgresql://autopredict:autopredict@postgres:5432/autopredict_db
      DATABASE_URL:    postgresql://autopredict:autopredict@postgres:5432/autopredict_db
      INFLUXDB_URL:    http://influxdb:8086
      INFLUXDB_TOKEN:  autopredict-dev-token
      INFLUXDB_ORG:    autopredict
      INFLUXDB_BUCKET: telemetry
      REDIS_URL:       redis://redis:6379/0
      KAFKA_BOOTSTRAP: kafka:29092
    depends_on:
      api:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./models/saved:/app/models/saved

  frontend:
    build:
      context: ./dealer_portal
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  influxdb_data:
  redis_data:
  mlflow_data:
  api_logs:
